<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Banner Secundário Viraliza Cortes</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0a0a0a; }
  .banner {
    width: 1070px;
    height: 300px;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(168, 85, 247, 0.25), transparent 70%),
      radial-gradient(ellipse 50% 40% at 50% 100%, rgba(236, 72, 153, 0.2), transparent 70%),
      linear-gradient(180deg, #0f0a1e 0%, #1a0f2e 100%);
    position: relative;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    color: #fff;
    padding: 32px 56px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* Subtle grid lines */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(168, 85, 247, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(168, 85, 247, 0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Top: title */
  .top {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 2;
  }
  .top .title {
    font-weight: 800;
    font-size: 20px;
    letter-spacing: 0.5px;
    color: #fff;
  }
  .top .accent {
    background: linear-gradient(135deg, #f0abfc 0%, #c084fc 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .top .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, #d946ef, #a21caf);
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1px;
    box-shadow: 0 4px 12px rgba(217, 70, 239, 0.4);
  }

  /* Platforms row */
  .platforms {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    z-index: 2;
  }
  .platform {
    background: rgba(255, 255, 255, 0.04);
    border: 1.5px solid rgba(168, 85, 247, 0.22);
    border-radius: 16px;
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    backdrop-filter: blur(8px);
  }
  .platform .icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: grid;
    place-items: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.3);
  }
  .platform .icon.tiktok { background: #000; }
  .platform .icon.reels  { background: linear-gradient(135deg, #f9ce34, #ee2a7b, #6228d7); }
  .platform .icon.shorts { background: #ff0000; }
  .platform .icon.facebook { background: #1877f2; }
  .platform .icon svg { width: 24px; height: 24px; fill: #fff; }
  .platform .name {
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.3px;
    color: #fff;
  }
  .platform .fmt {
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.5px;
    color: #c4b5fd;
    text-transform: uppercase;
  }

  /* Trust badges */
  .trust {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 2;
    flex-wrap: nowrap;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(34, 197, 94, 0.1);
    border: 1.5px solid rgba(34, 197, 94, 0.35);
    padding: 8px 14px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 11px;
    color: #86efac;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .badge .check {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #22c55e;
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }
  .badge .check svg { width: 10px; height: 10px; }
  .badge.purple {
    background: rgba(168, 85, 247, 0.12);
    border-color: rgba(168, 85, 247, 0.4);
    color: #d8b4fe;
  }
  .badge.purple .check { background: #a855f7; }
  .badge.pink {
    background: rgba(236, 72, 153, 0.12);
    border-color: rgba(236, 72, 153, 0.4);
    color: #f9a8d4;
  }
  .badge.pink .check { background: #ec4899; }
</style>
</head>
<body>
