<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Banner Topo Viraliza Cortes</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0a0a0a; }
  .banner {
    width: 1070px;
    height: 300px;
    background:
      radial-gradient(ellipse 80% 60% at 20% 30%, rgba(217, 70, 239, 0.45), transparent 70%),
      radial-gradient(ellipse 70% 50% at 90% 80%, rgba(124, 58, 237, 0.55), transparent 70%),
      linear-gradient(135deg, #4c1d95 0%, #6d28d9 35%, #a21caf 75%, #c026d3 100%);
    position: relative;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 56px;
    justify-content: space-between;
  }

  /* glow accents */
  .banner::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(236, 72, 153, 0.35), transparent 70%);
    filter: blur(30px);
    pointer-events: none;
  }
  .banner::after {
    content: '';
    position: absolute;
    bottom: -80px; right: 200px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(168, 85, 247, 0.4), transparent 70%);
    filter: blur(35px);
    pointer-events: none;
  }

  /* LEFT — Logo (real) */
  .left {
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 2;
    flex-shrink: 0;
  }
  .logo-card {
    width: 158px;
    height: 158px;
    border-radius: 28px;
    overflow: hidden;
    background: #000;
    box-shadow:
      0 12px 32px rgba(0,0,0,0.45),
      0 0 0 2px rgba(255,255,255,0.08),
      inset 0 0 0 1px rgba(168, 85, 247, 0.25);
    position: relative;
  }
  .logo-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* CENTER — slogan */
  .center {
    z-index: 2;
    text-align: center;
    flex: 1;
    padding: 0 32px;
  }
  .center .line1 {
    font-weight: 800;
    font-size: 30px;
    letter-spacing: -0.5px;
    line-height: 1.15;
    text-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .center .highlight {
    background: linear-gradient(180deg, #fde047 0%, #fbbf24 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .center .line2 {
    margin-top: 14px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.13);
    border: 1.5px solid rgba(255,255,255,0.3);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 9px 18px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.5px;
  }
  .center .line2 .br-flag { font-size: 16px; }

  /* RIGHT — Guarantee */
  .right {
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .seal {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 30%, #fef3c7 0%, #fbbf24 40%, #d97706 100%);
    display: grid;
    place-items: center;
    position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35),
                inset 0 -4px 12px rgba(120,53,15,0.4),
                inset 0 4px 12px rgba(255,255,255,0.5);
    transform: rotate(-8deg);
  }
  .seal::before {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    border: 2.5px dashed rgba(120,53,15,0.5);
  }
  .seal-content {
    text-align: center;
    color: #78350f;
    line-height: 1;
  }
  .seal-content .num {
    font-weight: 900;
    font-size: 42px;
    letter-spacing: -1px;
  }
  .seal-content .word {
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 1.5px;
    margin-top: 3px;
  }
  .seal-content .small {
    font-weight: 700;
    font-size: 9px;
    letter-spacing: 1px;
    margin-top: 2px;
    opacity: 0.85;
  }
  .seal-label {
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 2px;
    color: #fff;
    text-transform: uppercase;
    margin-top: 4px;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="left">
      <div class="logo-card">
        <img src="logo.png" alt="Viraliza Cortes">
      </div>
    </div>

    <div class="center">
      <div class="line1">
        1 link → Dezenas de <span class="highlight">cortes virais</span>
      </div>
      <div class="line2">
        <span class="br-flag">🇧🇷</span>
        <span>IA 100% BRASILEIRA · SEM MARCA D'ÁGUA</span>
      </div>
    </div>

    <div class="right">
      <div class="seal">
        <div class="seal-content">
          <div class="num">7</div>
          <div class="word">DIAS</div>
          <div class="small">DE GARANTIA</div>
        </div>
      </div>
      <div class="seal-label">RISCO ZERO</div>
    </div>
  </div>
</body>
</html>
